name: Scribe
options:
  bundleIdPrefix: dev.esoto
  deploymentTarget:
    macOS: "15.0"
packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    from: 0.15.4
  ArgmaxOSS:
    url: https://github.com/argmaxinc/argmax-oss-swift
    from: 1.0.0
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: 3.31.4
  SwiftHuggingFace:
    url: https://github.com/huggingface/swift-huggingface
    from: 0.9.0
  SwiftTransformers:
    url: https://github.com/huggingface/swift-transformers
    from: 1.3.0
settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
targets:
  Scribe:
    type: application
    platform: macOS
    sources:
      - Sources/Scribe
      - path: Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.esoto.scribe
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: scribe
        CFBundleShortVersionString: "1.1.0"
        CFBundleIconFile: AppIcon
        LSUIElement: true
        NSMicrophoneUsageDescription: "scribe listens while you hold the dictation key."
    dependencies: &mlDeps
      - package: FluidAudio
        product: FluidAudio
      - package: ArgmaxOSS
        product: WhisperKit
      - package: MLXSwiftLM
        products: [MLXLLM, MLXLMCommon, MLXHuggingFace]
      - package: SwiftHuggingFace
        product: HuggingFace
      - package: SwiftTransformers
        product: Tokenizers
  ScribeSpike:
    type: tool
    platform: macOS
    sources: [Sources/ScribeSpike]
    dependencies: *mlDeps
  ScribeTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests/ScribeTests, Sources/Scribe]
    dependencies: *mlDeps
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  ScribeModelTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests/ScribeModelTests, Sources/Scribe]
    dependencies: *mlDeps
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
